<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Owedify · VA mockup B</title>
<style>
  :root{ --accent:#4F7A52; --accent7:#3F6342; --accent50:#EFF5EF; --accent100:#DEEBDE; --ink:#1B2A3A; }
  html,body{margin:0;background:transparent;font-family:'Hanken Grotesk',system-ui,sans-serif;}
  .scaler{width:100%;overflow:hidden;}
  .stage{width:1024px;transform-origin:top left;}
  .panel{padding:20px 20px 8px;}
  .devarea{position:relative;width:1024px;height:524px;}
  .frame{position:absolute;}
  .frame .vp{position:relative;overflow:hidden;background:#fff;}
  .frame iframe{position:absolute;top:0;left:0;border:0;}
  /* video phone, left of center */
  .phone-video{left:214px;bottom:8px;z-index:2;}
  .phone-video .lid{background:#0E141C;border-radius:30px;padding:2.5px;box-shadow:0 40px 72px -30px rgba(20,32,44,.5);}
  .phone-video .vp{width:236px;height:511px;border-radius:27.5px;background:#1B2A3A;}
  .phone-video iframe{width:236px;height:511px;}

  /* the rating-math graphic, right of center, vertically centered */
  .calc{position:absolute;left:548px;top:62px;width:340px;}
  .calc .eb{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:#9AA6A0;}
  .calc h3{font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:27px;letter-spacing:-0.02em;line-height:1.08;color:var(--ink);margin:12px 0 0;}
  .calc .bars{display:flex;gap:24px;align-items:flex-end;height:240px;margin-top:24px;}
  .calc .bar{flex:1;height:100%;display:flex;align-items:flex-end;}
  .calc .col{width:100%;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px 10px;text-align:center;}
  .calc .col .ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .calc .col .ic svg{width:17px;height:17px;}
  .calc .col .num{font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:36px;letter-spacing:-0.02em;line-height:1;}
  .calc .col .sub{font-size:13px;font-weight:600;line-height:1.3;}
  .calc .bar.wrong .col{height:86%;background:#DDE3DF;}
  .calc .bar.wrong .ic{background:#C3CCC6;}
  .calc .bar.wrong .num{color:#8C958F;text-decoration:line-through;}
  .calc .bar.wrong .sub{color:#8C958F;}
  .calc .bar.right .col{height:72%;background:var(--accent);box-shadow:0 18px 34px -18px rgba(63,99,66,.55);}
  .calc .bar.right .ic{background:rgba(255,255,255,.22);}
  .calc .bar.right .num{color:#fff;}
  .calc .bar.right .sub{color:rgba(255,255,255,.86);}
  .calc .note{margin-top:24px;display:flex;gap:10px;align-items:flex-start;background:var(--accent50);border:1px solid var(--accent100);border-radius:14px;padding:14px 16px;}
  .calc .note svg{width:17px;height:17px;color:var(--accent);flex:0 0 auto;margin-top:1px;}
  .calc .note span{font-size:13.5px;line-height:1.5;color:var(--accent7);font-weight:600;}

  .strip{display:flex;align-items:center;justify-content:center;margin-top:24px;}
  .strip span{display:inline-flex;align-items:center;gap:9px;font-size:15.5px;font-weight:600;color:#26303A;padding:0 22px;}
  .strip span svg{width:18px;height:18px;color:var(--accent);}
  .strip i.sep{width:1px;height:16px;background:#C7D2C8;}
</style>
</head>
<body>
  <div class="scaler" id="scaler">
    <div class="stage" id="stage">
      <div class="panel">
        <div class="devarea">
          <div class="frame phone-video"><div class="lid"><div class="vp"><iframe src="va-phone-ad.html" title="Owedify VA ad" scrolling="no"></iframe></div></div></div>
          <div class="calc">
            <div class="eb">VA rating math</div>
            <h3>Combining is not adding.</h3>
            <div class="bars">
              <div class="bar wrong"><div class="col"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span><span class="num">80%</span><span class="sub">if you add them</span></div></div>
              <div class="bar right"><div class="col"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span><span class="num">70%</span><span class="sub">how VA combines</span></div></div>
            </div>
            <div class="note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span>A 50% and a 30% rating combine to 70%, not 80%. The kit does this math for you.</span></div>
          </div>
        </div>
        <div class="strip">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg> The kit on your phone</span>
          <i class="sep"></i>
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/></svg> What your ratings really add up to</span>
        </div>
      </div>
    </div>
  </div>
<script>
  var SCALER=document.getElementById('scaler'), STAGE=document.getElementById('stage');
  function fit(){var sc=SCALER.clientWidth/1024;STAGE.style.transform='scale('+sc+')';SCALER.style.height=(STAGE.offsetHeight*sc)+'px';}
  fit();window.addEventListener('resize',fit);setTimeout(fit,400);

  /* ---- drag the phone to reposition it; the choice persists ---- */
  (function(){
    var ph=document.querySelector('.phone-video'), area=document.querySelector('.devarea');
    var KEY='owedify-va-b-phonepos', DEF={left:214,bottom:8};
    function apply(p){ ph.style.left=p.left+'px'; ph.style.bottom=p.bottom+'px'; readout(p); }
    try{var saved=JSON.parse(localStorage.getItem(KEY)); if(saved&&typeof saved.left==='number') apply(saved);}catch(e){}
    if(!/[?&]edit\b/.test(location.search)) return;

    var hint=document.createElement('div');
    hint.style.cssText='position:absolute;left:10px;top:10px;z-index:20;display:flex;gap:8px;align-items:center;font-family:Hanken Grotesk,system-ui,sans-serif;';
    hint.innerHTML='<span style="display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12.5px;color:#5A6B7A;background:rgba(255,255,255,.82);border:1px solid #E1E6EB;border-radius:999px;padding:6px 12px;">&#10021; drag the phone</span><button id="vbreset" style="font:600 12px Hanken Grotesk,system-ui,sans-serif;color:#5A6B7A;background:rgba(255,255,255,.82);border:1px solid #E1E6EB;border-radius:999px;padding:6px 11px;cursor:pointer;">reset</button><span id="vbpos" style="font:600 11px IBM Plex Mono,monospace;color:#9AA6A0;"></span>';
    area.appendChild(hint);
    function readout(p){var el=document.getElementById('vbpos'); if(el) el.textContent='left '+Math.round(p.left)+' · bottom '+Math.round(p.bottom);}
    readout(saved&&typeof saved.left==='number'?saved:DEF);
    document.getElementById('vbreset').addEventListener('click',function(){apply(DEF);try{localStorage.removeItem(KEY);}catch(e){}});

    var drag=false,sx,sy,sl,sb;
    function pt(e){return e.touches&&e.touches[0]?e.touches[0]:e;}
    function down(e){drag=true;var p=pt(e);sx=p.clientX;sy=p.clientY;sl=parseFloat(ph.style.left||DEF.left);sb=parseFloat(ph.style.bottom||DEF.bottom);ph.style.cursor='grabbing';e.preventDefault();}
    function move(e){if(!drag)return;var sc=SCALER.clientWidth/1024;var p=pt(e);var nl=sl+(p.clientX-sx)/sc, nb=sb-(p.clientY-sy)/sc;ph.style.left=nl+'px';ph.style.bottom=nb+'px';readout({left:nl,bottom:nb});e.preventDefault();}
    function up(){if(!drag)return;drag=false;ph.style.cursor='grab';var p={left:Math.round(parseFloat(ph.style.left)),bottom:Math.round(parseFloat(ph.style.bottom))};try{localStorage.setItem(KEY,JSON.stringify(p));}catch(e){}}
    ph.style.cursor='grab';ph.style.touchAction='none';
    ph.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
    ph.addEventListener('touchstart',down,{passive:false});window.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);
  })();
</script>
</body>
</html>
